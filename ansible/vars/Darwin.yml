# keep-sorted start newline_separated=yes
# Items to add to the dock
dock_add_items:
  - /Applications/Ghostty.app
  - /Applications/Brave Browser Beta.app

# The Dock icons size
dock_icons_size: 36.0

homebrew_casks:
  # keep-sorted start
  - alt-tab
  - brave-browser@beta
  - cursor
  - darktable
  - digikam
  - font-meslo-lg-nerd-font # Nerd Font glyphs for the terminal prompt/icons and VS Code
  - ghostty
  - grammarly-desktop
  - home-assistant
  - keepassxc
  - keepingyouawake
  - kopiaui
  - mpv
  - mysides # Application for managing OS X Finder sidebar favorites
  - obs
  - stats
  - thaw
  - utm
  - visual-studio-code
  # keep-sorted end

homebrew_packages:
  # keep-sorted start
  - ab-av1
  - actions-up
  - ansible
  - atuin
  - awscli
  - azure-cli
  - bash
  - bat
  - betterleaks # pre-commit hook
  - carapace
  - checkov # needs gcc, openblas; pre-commit hook (terraform_checkov)
  - cilium-cli
  - cloudflared # needed for ssh with cloudflare tunnels
  - codeburn
  - colima
  - dive
  - docker-buildx
  - dockutil
  - dua-cli
  - eks-node-viewer
  - eksctl
  - exiftool
  - eza
  - fd
  - fnox
  - fzf
  - gawk
  - gh
  - git
  - git-delta # A viewer for git and diff output
  - gnu-sed
  - gnu-tar
  - gnupg
  - grep
  - hashicorp/tap/terraform # pre-commit hook (terraform_fmt, terraform_validate)
  - helm
  - htop
  - imagemagick
  - infat
  - iproute2mac
  - jq
  - k9s
  - keep-sorted # pre-commit hook
  - kind
  - kopia
  - krew
  - kubecolor
  - kubernetes-cli
  - midnight-commander
  - mise
  - mpg123 # needed for mc to display mp3 files
  - neovim
  - oh-my-posh
  - opencode
  - opentofu
  - prek # runs the pre-commit config
  - prettier # pre-commit hook
  - rclone
  - rhash
  - rmtrash
  - rsync
  - shellcheck # pre-commit hook
  - shfmt # pre-commit hook
  - telnet
  - tfupdate # pre-commit hook
  - tig
  - trivy # pre-commit hook (terraform_trivy)
  - uutils-coreutils
  - uutils-diffutils
  - uutils-findutils
  - watch
  - wget
  - yamllint # pre-commit hook
  - yq
  - yt-dlp
  - zoxide
  - zsh-completions
  - zsh-syntax-highlighting
  # keep-sorted end

homebrew_prefix: "{% if (ansible_facts['architecture'] | regex_search('arm')) %}/opt/homebrew/{% else %}/usr/local/{% endif %}"

homebrew_taps:
  - aws/tap
  - hashicorp/tap

login_items_enabled:
  # keep-sorted start
  - AltTab
  - KeePassXC
  - Stats
  - Thaw
  # keep-sorted end

login_picture_url: https://www.gravatar.com/avatar/{{ email | hash('md5') }}?s=500 # DevSkim: ignore DS126858

run_applications:
  - AltTab
  - Stats
# keep-sorted end
